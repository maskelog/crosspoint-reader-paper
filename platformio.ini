[platformio]
default_envs = m5paper
extra_configs = platformio.local.ini

; ── M5Paper (ESP32 D0WDQ6-V3, 16MB flash, 8MB SPI PSRAM, IT8951E EPD) ─────────
[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = m5stack-fire
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions_m5paper.csv
board_build.arduino.memory_type = qio_qspi

; fix_assembler.py must run first — prevents Windows system 'as.exe' from
; intercepting --longcalls injected by the m5stack-fire board JSON.
extra_scripts =
  pre:scripts/fix_assembler.py
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py

build_unflags =
  -std=gnu++11
  -fexceptions
  -O2
  -Os

build_flags =
  -std=gnu++2a
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -fno-exceptions
  -DUSE_UTF8_LONG_NAMES=1
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars
  -Os
  ; ESP32 LX6 windowed registers blow the default 8KB loop stack on deep UI
  ; paths (settings menus, font-fallback render). 32KB matches diy reader.
  -DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768
  ; Board identifier — single target, no more PaperS3 conditionals.
  -DCROSSPOINT_M5PAPER=1
  -DBOARD_HAS_PSRAM=1
  ; ESP32 classic DROM is hardware-limited to 4MB; exclude large font variants.
  -DOMIT_FONTS=1
  ; M5Paper SD card — CS on GPIO4 (hardware fixed).
  -DM5PAPER_SD_CS=4
  ; Dead-code elimination
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections
  -Wl,--allow-multiple-definition
  -Wl,-Map,.pio/build/m5paper/firmware.map

lib_deps =
  greiman/SdFat @ ^2.2.3
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3
  m5stack/M5Unified @ ^0.2.5
  m5stack/M5GFX @ ^0.2.7

[crosspoint]
version = 0.1.0

[env:m5paper]
extends = base
build_flags =
  ${base.build_flags}
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2

[env:m5paper_release]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1

[env:m5paper_slim]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-slim\"
  -UENABLE_SERIAL_LOG
